services:
  claude-runner:
    build: .
    container_name: claude-runner
    env_file: .env
    environment:
      - PROJECT_DIR=/project
    volumes:
      - project-data:/project
      - ~/.claude:/root/.claude
      - ./logs:/app/logs
      - ./.sessions:/app/.sessions
    restart: unless-stopped

volumes:
  project-data:
